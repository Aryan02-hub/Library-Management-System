<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert stage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="form-box login">
            <form action="">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" name="" id="" placeholder="Enter User Name" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                    <div class="input-box">
                        <input type="password" placeholder="Enter Password" required>
                    <i class="fa-solid fa-lock"></i>
                    </div>
                
                    <div class="forget-link">
                        <a href="#">Forget Password</a>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <p>or login with social platforms</p>
                    <div class="social-icons">
                        <a href="#"><i class="fa-brands fa-google"></i></a>
                        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#"><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                
            </form>
        </div>
        <div class="form-box Registeration">
            <form action="">
                <h1>Registeration</h1>
                <div class="input-box">
                    <input type="text" name="" id="" placeholder="Enter User Name" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                        <input type="Email" placeholder="Enter E-mail" required>
                    <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" placeholder="Enter Password" required>
                    <i class="fa-solid fa-lock"></i>
                    </div>
                    
                    <button type="submit" class="btn">Register</button>
                    <p>or Register with social platforms</p>
                    <div class="social-icons">
                        <a href="#"><i class="fa-brands fa-google"></i></a>
                        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#"><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                
            </form>
        </div>
        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account</p>
                <button class="btn register-btn">Registers</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
